{% extends 'base.html' %}
{% block title %}Assistly | Create Request{% endblock %}
{% block content %}
<div class="page-shell">
    <section class="hero-panel">
        <h2 class="mb-1">Create Help Request</h2>
        <p class="text-secondary mb-0">Provide clear details so nearby volunteers can respond quickly and effectively.</p>
    </section>
    <div class="row justify-content-center">
    <div class="col-xl-10">
        <div class="card section-card">
            <div class="card-body">
                <form method="post" action="{{ url_for('requests.create_request_route') }}">
                    <div class="mb-3">
                        <label class="form-label">Community *</label>
                        <select name="community_id" class="form-select" required>
                            <option value="">Select a community</option>
                            {% for community in communities %}
                            <option value="{{ community._id }}">{{ community.name }} ({{ community.location }})</option>
                            {% endfor %}
                        </select>
                        <small class="text-secondary">You can only create requests in communities you've joined.</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Title *</label>
                        <input type="text" name="title" class="form-control" placeholder="Brief title of your request" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Description *</label>
                        <textarea name="description" class="form-control" rows="4" placeholder="Provide details about what you need help with" required></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Category *</label>
                        <select name="category" class="form-select" required>
                            <option value="">Select a category</option>
                            {% for category in categories %}
                            <option value="{{ category }}">{{ category }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Location Description</label>
                        <input type="text" name="location_text" class="form-control" placeholder="e.g., Near Main Street Market">
                    </div>
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Latitude (Optional)</label>
                            <input type="number" name="lat" class="form-control" step="0.000001" placeholder="e.g., 40.7128">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Longitude (Optional)</label>
                            <input type="number" name="lng" class="form-control" step="0.000001" placeholder="e.g., -74.0060">
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">Submit Request</button>
                        <a href="{{ url_for('dashboard.user_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</div>
{% endblock %}
